<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Similarity Test</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow & Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-toggle-container">
        <button id="theme-toggle">Dark Mode</button>
    </div>
    
    <div class="main-wrapper">
        <!-- Lotto Generator Section -->
        <div class="container lotto-section">
            <h1>Lotto Number Generator</h1>
            <button id="generator-btn">Generate Numbers</button>
            <div id="lotto-numbers-container"></div>
        </div>

        <!-- Animal Similarity Test Section -->
        <div class="container animal-test-section">
            <h2>Animal Similarity Test</h2>
            <p>Upload a photo of a dog or cat to see the AI's prediction!</p>
            <div class="upload-area">
                <input type="file" id="image-upload" accept="image/*" class="file-input">
            </div>
            <div id="image-preview">
                <img id="face-image" src="" alt="Face Image" style="display:none; max-width:100%; border-radius:10px; margin: 20px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            </div>
            <div id="loading-msg" style="display:none; font-weight: bold; margin: 10px 0;">AI is analyzing...</div>
            <div id="label-container"></div>
        </div>

        <!-- Partnership Inquiry Form Section -->
        <div class="container contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xnjgpeyk" method="POST">
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" placeholder="Tell us about your proposal..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </div>

        <!-- Disqus Comment Section -->
        <div class="container comment-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-aegevqbqlp.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
