<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Partnership</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle-container">
        <button id="theme-toggle">Dark Mode</button>
    </div>
    
    <div class="main-wrapper">
        <!-- Lotto Generator Section -->
        <div class="container lotto-section">
            <h1>Lotto Number Generator</h1>
            <button id="generator-btn">Generate Numbers</button>
            <div id="lotto-numbers-container"></div>
        </div>

        <!-- Partnership Inquiry Form Section -->
        <div class="container contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xnjgpeyk" method="POST">
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" placeholder="Tell us about your proposal..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
