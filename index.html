<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Partnership</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle-container">
        <button id="theme-toggle">Dark Mode</button>
    </div>
    
    <div class="main-wrapper">
        <!-- Lotto Generator Section -->
        <div class="container lotto-section">
            <h1>Lotto Number Generator</h1>
            <button id="generator-btn">Generate Numbers</button>
            <div id="lotto-numbers-container"></div>
        </div>

        <!-- Partnership Inquiry Form Section -->
        <div class="container contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xnjgpeyk" method="POST">
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" placeholder="Tell us about your proposal..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </div>

        <!-- Disqus Comment Section -->
        <div class="container comment-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-aegevqbqlp.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
